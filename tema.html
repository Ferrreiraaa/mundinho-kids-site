<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tema | Mundinho Kids</title>
  <meta name="description" content="Galeria de temas da Mundinho Kids." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header inner">
    <div class="container nav">
      <a href="index.html" class="brand">
        <div class="brand-logo-fake">MK</div>
        <div>
          <strong>Mundinho Kids</strong>
          <small>Catálogo de personagens vivos</small>
        </div>
      </a>
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="index.html#catalogo">Todos os temas</a>
      </nav>
    </div>
  </header>

  <main class="section theme-page">
    <div class="container">
      <a href="index.html#catalogo" class="back-link">← Voltar ao catálogo</a>

      <section class="theme-hero" id="themeHero">
        <div class="theme-hero-image-wrap">
          <img id="themeCover" src="" alt="" class="theme-hero-image">
        </div>
        <div class="theme-hero-text">
          <span class="eyebrow">Tema selecionado</span>
          <h1 id="themeTitle">Tema</h1>
          <p id="themeDescription"></p>
          <div class="theme-meta" id="themeMeta"></div>
        </div>
      </section>

      <section class="section compact">
        <div class="section-heading left">
          <span class="eyebrow">Galeria</span>
          <h2>Fotos do tema</h2>
          <p>Imagens maiores para visualizar melhor os detalhes do personagem, figurino e presença visual.</p>
        </div>
        <div class="theme-gallery" id="themeGallery"></div>
      </section>
    </div>
  </main>

  <a href="#" class="floating-btn whatsapp" aria-label="WhatsApp" title="Adicionar link do WhatsApp depois">
    <span>✆</span>
  </a>

  <a href="#" class="floating-btn instagram" aria-label="Instagram" title="Adicionar link do Instagram depois">
    <span>⌁</span>
  </a>

  <script src="script.js"></script>
</body>
</html>
